apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: credit-agent
  version: 1.0.0
  description: >
    Credit Agent — sub-agent that retrieves customer credit limit, utilisation,
    creditworthiness score, and risk class from SAP S/4HANA Credit Management.

type: agent

container:
  buildPath: .
  port: 5000

requires:
  - name: credit-management-business-partner-mcp-demo
    kind: mcp-server
    ordId: sap.mcpbuilder:apiResource:credit_management_business_partner_mcp_demo:v1

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
